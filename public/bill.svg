<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 90">
  <defs>
    <linearGradient id="bill-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#03060d"/>
    </linearGradient>
    <linearGradient id="bill-blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6cc1ff"/>
      <stop offset="100%" stop-color="#0a5ec2"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="198" height="88" rx="6" fill="url(#bill-bg)" stroke="#3aa6ff" stroke-width="1.5"/>
  <rect x="6" y="6" width="188" height="78" rx="4" fill="none" stroke="#cfd6e4" stroke-opacity="0.32" stroke-dasharray="2 3"/>
  <!-- Center seal -->
  <circle cx="100" cy="45" r="22" fill="none" stroke="url(#bill-blue)" stroke-width="2"/>
  <circle cx="100" cy="45" r="16" fill="none" stroke="#cfd6e4" stroke-opacity="0.45"/>
  <text x="100" y="53" text-anchor="middle" font-family="Cinzel, serif" font-size="22" font-weight="900" fill="url(#bill-blue)">$</text>
  <!-- Corner numerals -->
  <text x="14" y="22" font-family="Cinzel, serif" font-size="14" font-weight="800" fill="#cfd6e4" fill-opacity="0.85">100</text>
  <text x="186" y="80" text-anchor="end" font-family="Cinzel, serif" font-size="14" font-weight="800" fill="#cfd6e4" fill-opacity="0.85">100</text>
  <!-- Engraving lines -->
  <g stroke="#3aa6ff" stroke-opacity="0.35" fill="none" stroke-width="0.6">
    <path d="M14 44 Q 50 30, 70 45 T 130 45 T 186 44"/>
    <path d="M14 50 Q 50 36, 70 51 T 130 51 T 186 50"/>
